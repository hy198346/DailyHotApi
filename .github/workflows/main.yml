name: Hot Search Push

on:
  # schedule:
  #   - cron: '0 0,4,8,12 * * *'  # 对应UTC时间，转换为北京时间为8:00, 12:00, 16:00, 20:00
  #
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-hot-search:
    runs-on: ubuntu-latest
    steps:
      - name: 设置时区（调试用）
        run: sudo timedatectl set-timezone UTC
      
      - name: 输出当前时间（调试）
        run: date
        
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start backend service
        run: npm start &

      - name: Wait for service to start
        run: sleep 10

      - name: Push hot search data
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: |
          echo "当前工作目录: $(pwd)"
          node push_script.js
          if [ $? -eq 0 ]; then
            echo "✅ 热榜数据推送成功"
          else
            echo "❌ 热榜数据推送失败！"
            exit 1
          fi
