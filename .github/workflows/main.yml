name: Hot Search Push

on:
  schedule:
    - cron: '0 0,4,8,12 * * *'  # 对应UTC时间，转换为北京时间为8:00, 12:00, 16:00, 20:00
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  push-hot-search:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Start backend service
        run: npm start &

      - name: Wait for service to start
        run: sleep 10

      - name: Push hot search data
        env:
          SCKEY: ${{ secrets.SCKEY }}
        run: node push_script.js
